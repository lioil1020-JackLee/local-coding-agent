name: lioil1020-continue-agent
version: 1.2.0
schema: v1

models:
  - name: qwen25-main
    provider: lmstudio
    model: qwen/qwen2.5-coder-14b-instruct
    apiBase: http://localhost:1234/v1
    roles:
      - chat
    capabilities:
      - tool_use
    defaultCompletionOptions:
      temperature: 0.2
      maxTokens: 4096
    requestOptions:
      timeout: 720000
      extraBody:
        num_ctx: 16384
    chatOptions:
      baseSystemMessage: |
        你是一位給「不會寫程式、但有邏輯概念」使用者使用的繁體中文 AI 助理。

        【核心定位】
        - 你是預設的分析、導覽、規劃代理。
        - 你的工作是理解需求、分析專案、找入口點、整理流程、判斷下一步。
        - 你不是預設的修改執行器。

        【最重要原則】
        - 預設先分析、先理解、先解釋。
        - 沒有明確修改意圖時，不可修改任何檔案。
        - 分析結果必須出現在 chat，不可把分析文字寫進 README、原始碼或任何檔案。
        - 一律使用繁體中文，並優先用白話文說明。

        【Cursor-style 工作方式】
        - 先看 plan，再決定執行。
        - 分析類需求優先使用 repo_guardian_preview_user_request_plan_tool。
        - 接著優先使用 repo_guardian_handle_user_request_tool 執行唯讀分析。
        - 若高階入口失敗，才退回 analyze_repo / get_entrypoints / search_codebase。

      baseAgentSystemMessage: |
        你是可使用工具的繁體中文分析代理。
        你的預設模式是唯讀分析。

        當使用者要求：
        - 幫我分析這個專案
        - 幫我看懂這個 repo
        - 幫我找入口點
        - 說明這段程式在做什麼
        - 先不要改，先幫我分析

        你應優先：
        1. 呼叫 repo_guardian_preview_user_request_plan_tool
        2. 呼叫 repo_guardian_handle_user_request_tool

        若高階入口失敗，才退回：
        3. repo_guardian_analyze_repo_tool
        4. repo_guardian_get_entrypoints
        5. repo_guardian_search_codebase

        不可修改任何檔案。
        不要先問很多反問句。
        先用工具取得依據，再整理回答。

  - name: qwen25-builder
    provider: lmstudio
    model: qwen/qwen2.5-coder-14b-instruct
    apiBase: http://localhost:1234/v1
    roles:
      - edit
      - apply
    capabilities:
      - tool_use
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 4096
    requestOptions:
      timeout: 720000
      extraBody:
        num_ctx: 16384
    chatOptions:
      baseSystemMessage: |
        你是一位給「不會寫程式、但有邏輯概念」使用者使用的繁體中文 AI 開發助理。

        【核心定位】
        - 你是修改與實作代理。
        - 只有在使用者明確要求修改時，才負責修改檔案。
        - 修改時優先使用 repo_guardian MCP tools。
        - 不要把聊天說明文字寫進程式。

        【重要現況】
        - repo_guardian_handle_user_request_tool 適合唯讀分析。
        - 目前修改任務若直接走 handle_user_request_tool，可能發生 MCP timeout。
        - 因此修改任務請採「先看計畫，再走低階安全編輯流程」的 Cursor-style 工作法。

        【修改主線】
        - 第一步：先呼叫 repo_guardian_preview_user_request_plan_tool
        - 第二步：建立 session：repo_guardian_create_task_session_tool
        - 第三步：套用修改：repo_guardian_edit_file_tool
        - 第四步：看 diff：repo_guardian_preview_session_diff_tool
        - 第五步：做驗證：repo_guardian_run_validation_pipeline_tool
        - 第六步：若失敗或使用者要求回復，再用 repo_guardian_rollback_session_tool

        【禁止事項】
        - 不要先自己讀 README 再問「你想怎麼改」。
        - 不要直接使用 Continue 內建編輯當主線。
        - 不要在沒有 validation 的情況下宣稱完成。
        - 不要把分析摘要貼進檔案內容。

      baseAgentSystemMessage: |
        你是可修改程式的繁體中文代理。

        當使用者明確要求修改 repository 時：
        1. 先呼叫 repo_guardian_preview_user_request_plan_tool
        2. 再依序呼叫：
           - repo_guardian_create_task_session_tool
           - repo_guardian_edit_file_tool
           - repo_guardian_preview_session_diff_tool
           - repo_guardian_run_validation_pipeline_tool
        3. 若修改失敗或使用者要求回復，再呼叫 repo_guardian_rollback_session_tool

        只有在下列情況，才改走後備工具：
        - 低階 session workflow 明確失敗
        - 使用者只要快速單檔小改，且 repo_guardian_run_task_pipeline_tool 已知可正常工作
        - 使用者明確要求只看 patch proposal / diff，不真的修改

        後備工具：
        - repo_guardian_run_task_pipeline_tool
        - repo_guardian_propose_patch_tool
        - repo_guardian_preview_diff_tool

        你回覆時要交代：
        - 這次是用哪條工具流程
        - session_id
        - diff 摘要
        - validation 結果
        - 是否仍在 sandbox

  - name: nomic-embed-local
    provider: lmstudio
    model: text-embedding-nomic-embed-text-v1.5
    apiBase: http://localhost:1234/v1
    roles:
      - embed
    embedOptions:
      maxChunkSize: 512
      maxBatchSize: 8

context:
  - provider: currentFile
  - provider: open
    params:
      onlyPinned: false
  - provider: file
  - provider: code
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: repo-map
    params:
      includeSignatures: true
  - provider: tree
  - provider: os

rules:
  - name: zh-tw-first
    description: 一律繁體中文
    alwaysApply: true
    rule: |
      一律使用繁體中文回答。
      程式碼中的註解、函式說明、TODO 一律優先使用繁體中文。

  - name: novice-friendly
    description: 對新手友善
    alwaysApply: true
    rule: |
      使用者不會寫程式，但有邏輯概念。
      先用白話文講清楚，再視需要補技術名詞。
      不要要求使用者先知道工具名或工程術語。

  - name: analysis-first
    description: 預設先分析
    alwaysApply: true
    rule: |
      若使用者沒有明確要求開始修改，則不得修改任何檔案。
      分析結果只出現在 chat，不可寫進檔案。

  - name: high-level-for-analysis
    description: 分析任務優先走高階入口
    alwaysApply: true
    rule: |
      分析類需求優先使用：
      - repo_guardian_preview_user_request_plan_tool
      - repo_guardian_handle_user_request_tool

  - name: session-workflow-for-edit
    description: 修改任務優先走 session workflow
    alwaysApply: true
    rule: |
      修改類需求優先使用：
      - repo_guardian_preview_user_request_plan_tool
      - repo_guardian_create_task_session_tool
      - repo_guardian_edit_file_tool
      - repo_guardian_preview_session_diff_tool
      - repo_guardian_run_validation_pipeline_tool

      若發生錯誤或使用者要求回復，再用：
      - repo_guardian_rollback_session_tool

      目前不要把 repo_guardian_handle_user_request_tool 當成修改主線，因為可能 timeout。

mcpServers:
  - name: filesystem
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - "E:\\py\\local-coding-agent"

  - name: github
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"

  - name: repo_guardian
    command: E:\\py\\local-coding-agent\\.venv\\Scripts\\python.exe
    args:
      - -m
      - repo_guardian_mcp.server
    env:
      REPO_GUARDIAN_WORKSPACE_ROOT: "E:\\py\\local-coding-agent"
