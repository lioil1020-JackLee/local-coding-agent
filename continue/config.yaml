name: lioil1020-continue-agent
version: 1.2.0
schema: v1

models:
  - name: qwen25-main
    provider: lmstudio
    model: qwen/qwen2.5-coder-14b-instruct
    apiBase: http://localhost:1234/v1
    contextLength: 20480
    roles:
      - chat
    capabilities:
      - tool_use
    defaultCompletionOptions:
      temperature: 0.2
      maxTokens: 3072
    requestOptions:
      timeout: 720000
      extraBody:
        num_ctx: 20480
    chatOptions:
      baseSystemMessage: |
        你是本地端 coding agent，請以繁體中文回覆，語氣清楚、務實、可執行。
        使用者是新手，請優先用白話說明，不要堆疊術語。
      baseAgentSystemMessage: |
        先理解需求，再規劃步驟，最後執行與驗證。
        若資訊不足，先用工具查證，不可憑空猜測。

  - name: qwen25-builder
    provider: lmstudio
    model: qwen/qwen2.5-coder-14b-instruct
    apiBase: http://localhost:1234/v1
    contextLength: 20480
    roles:
      - edit
      - apply
    capabilities:
      - tool_use
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 3072
    requestOptions:
      timeout: 720000
      extraBody:
        num_ctx: 20480
    chatOptions:
      baseSystemMessage: |
        你是安全編輯模式的 agent。
        修改前先分析，修改後要驗證，必要時提出回滾方案。
      baseAgentSystemMessage: |
        嚴禁把聊天內容寫進程式碼。
        僅修改與任務直接相關檔案，並回報變更與驗證結果。

  - name: qwen30-main
    provider: lmstudio
    model: qwen/qwen3-coder-30b-a3b-instruct
    apiBase: http://localhost:1234/v1
    contextLength: 12288
    roles:
      - chat
    capabilities:
      - tool_use
    defaultCompletionOptions:
      temperature: 0.2
      maxTokens: 2048
    requestOptions:
      timeout: 720000
      extraBody:
        num_ctx: 12288

  - name: qwen30-builder
    provider: lmstudio
    model: qwen/qwen3-coder-30b-a3b-instruct
    apiBase: http://localhost:1234/v1
    contextLength: 12288
    roles:
      - edit
      - apply
    capabilities:
      - tool_use
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 2048
    requestOptions:
      timeout: 720000
      extraBody:
        num_ctx: 12288

  - name: nomic-embed-local
    provider: lmstudio
    model: text-embedding-nomic-embed-text-v1.5
    apiBase: http://localhost:1234/v1
    roles:
      - embed
    embedOptions:
      maxChunkSize: 512
      maxBatchSize: 8

context:
  - provider: code
  - provider: diff
  - provider: problems

rules:
  - name: zh-tw-first
    description: 全程使用繁體中文
    alwaysApply: true
    rule: |
      所有回覆、註解、操作說明一律使用繁體中文。
      若是程式碼中的 TODO 註解，也請用繁體中文。

  - name: novice-friendly
    description: 新手友善
    alwaysApply: true
    rule: |
      先說結論，再說原因，最後給可執行下一步。
      盡量用白話，不要預設使用者懂工程術語。

  - name: plain-language-intent
    description: 白話需求也能執行
    alwaysApply: true
    rule: |
      把模糊需求轉成可執行步驟，不要求使用者下精準指令。
      若任務範圍太大，主動切成小步驟並持續完成，不要只停在提問。
      需要完整理解專案時，先用 repo_guardian_analyze_repo_tool，
      並在必要時設定 read_all_python=true。

  - name: analysis-first
    description: 先分析後修改
    alwaysApply: true
    rule: |
      分析階段禁止修改檔案。
      進入修改階段後，僅做與目標相關的最小必要變更。

  - name: high-level-for-analysis
    description: 分析優先流程
    alwaysApply: true
    rule: |
      分析需求時優先使用：
      - repo_guardian_preview_user_request_plan_tool
      - repo_guardian_handle_user_request_tool

  - name: session-workflow-for-edit
    description: 安全編輯流程
    alwaysApply: true
    rule: |
      編輯需求優先使用：
      - repo_guardian_preview_user_request_plan_tool
      - repo_guardian_handle_user_request_tool (apply=false)
      - repo_guardian_create_task_session_tool
      - repo_guardian_edit_file_tool
      - repo_guardian_preview_session_diff_tool
      - repo_guardian_run_validation_pipeline_tool
      失敗時可使用：
      - repo_guardian_rollback_session_tool

  - name: web-search-when-needed
    description: 需要時自動上網查證
    alwaysApply: true
    rule: |
      若答案依賴會變動或未知資訊，先使用 ddg-search 查證。
      若 ddg-search 不可用或失敗，改走本機備援流程。
      回覆要精簡，並附上來源連結。
      若網路工具不可用，必須清楚說明並改走本機備援流程。

  - name: strict-fallback-no-stall
    description: 工具失敗也不可卡住
    alwaysApply: true
    rule: |
      工具失敗時，不可只回「做不到」。
      需依序做到：
      1) 一句話說明目前卡點
      2) 立刻改做本機可驗證內容
      3) 提供可直接執行的下一步
      必須誠實，不可編造結果。

mcpServers:
  - name: filesystem
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - "E:\\py\\local-coding-agent"

  - name: github
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"

  - name: ddg-search
    command: npx
    args:
      - -y
      - "@oevortex/ddg_search@1.2.2"

  - name: repo_guardian
    command: E:\\py\\local-coding-agent\\.venv\\Scripts\\python.exe
    args:
      - -m
      - repo_guardian_mcp.server
    env:
      REPO_GUARDIAN_WORKSPACE_ROOT: "E:\\py\\local-coding-agent"
